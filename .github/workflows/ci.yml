name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 12 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: Swift test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test
        run: swift test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency scan (OSV)
    if: github.event_name != 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5
    with:
      scan-args: |-
        --recursive
        .
    permissions:
      actions: read
      contents: read
      security-events: write

  dependency-scan-pr:
    name: Dependency scan (OSV PR)
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5
    with:
      scan-args: |-
        --recursive
        .
    permissions:
      actions: read
      contents: read
      security-events: write
